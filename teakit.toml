modId = "liteminer"
projectKey = "liteminer"

[defaults]
launcher = "gradle"
workingDirectory = "."
gradleWrapper = "./gradlew"
noDaemon = true
console = "plain"
maxWorkers = 1
configureOnDemand = false

[defaults.gradleProperties]
"liteminer.withTeaKit" = "true"

[defaults.systemProperties]
"liteminer.withTeaKit" = "true"
"teakit.enabled" = "true"
"teakit.autoWorld" = "true"
"teakit.runtimeApi.required" = "1"
"teakit.worldId" = "liteminer_teakit"
"teakit.worldName" = "Liteminer TeaKit"

[nodes."1.21.11-fabric"]
loader = "fabric"
minecraft = "1.21.11"
tasks = [":fabric:1.21.11:runClient"]
gameDirectory = "fabric/versions/1.21.11/runs/client"

[nodes."1.21.11-forge"]
loader = "forge"
minecraft = "1.21.11"
tasks = [":forge:1.21.11:runClient"]
gameDirectory = "forge/versions/1.21.11/run"

[nodes."1.21.11-forge".environment]
GLFW_PLATFORM = "x11"
XDG_SESSION_TYPE = "x11"
WAYLAND_DISPLAY = ""

[nodes."1.21.11-neoforge"]
loader = "neoforge"
minecraft = "1.21.11"
tasks = [":neoforge:1.21.11:runClient"]
gameDirectory = "neoforge/versions/1.21.11/run"

[nodes."1.21.11-neoforge".environment]
GLFW_PLATFORM = "x11"
XDG_SESSION_TYPE = "x11"
WAYLAND_DISPLAY = ""

